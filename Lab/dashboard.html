    <style>
      /* Custom animation for drawer sliding in */
      @keyframes slideInLeft {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(0);
        }
      }
      .animate-slide-in {
        animation: slideInLeft 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .animate-fade-in {
        animation: fadeIn 0.3s ease-in-out forwards;
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface font-body-lg text-body-lg min-h-screen overflow-hidden antialiased"
  >
    <!-- TopNavBar (Shared Component) -->
    <nav
      class="bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline shadow-sm fixed top-0 left-0 w-full z-50 flex justify-between items-center px-gutter h-16"
    >
      <div class="flex items-center gap-sm">
        <button
          aria-label="Open menu"
          class="p-2 rounded-full hover:bg-surface-container-high transition-colors cursor-pointer active:scale-95 text-primary dark:text-inverse-primary"
        >
          <span class="material-symbols-outlined block" data-icon="menu"
            >menu</span
          >
        </button>
        <h1
          class="font-headline-lg text-headline-lg font-bold text-primary dark:text-primary-fixed hidden sm:block"
        >
          Laboratório Químico Virtual
        </h1>
        <h1
          class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed block sm:hidden"
        >
          Laboratório Químico Virtual
        </h1>
      </div>
      <div
        class="flex items-center gap-sm text-primary dark:text-inverse-primary"
      >
        <button
          aria-label="Account"
          class="p-2 rounded-full hover:bg-surface-container-high transition-colors cursor-pointer active:scale-95"
        >
          <span
            class="material-symbols-outlined block"
            data-icon="account_circle"
            >account_circle</span
          >
        </button>
        <button
          aria-label="Help"
          class="p-2 rounded-full hover:bg-surface-container-high transition-colors cursor-pointer active:scale-95"
        >
          <span class="material-symbols-outlined block" data-icon="help"
            >help</span
          >
        </button>
      </div>
    </nav>
    <!-- Main Content Area (Background Context) -->

        data-alt="A high-end, photorealistic 3D render of a clean white laboratory workbench set against a deep, dark navy blue background with soft, out-of-focus bokeh lights. On the pristine white surface sits a collection of clear glass chemistry apparatus, including beakers, Erlenmeyer flasks, a graduated cylinder, and a complex distillation setup. The lighting is crisp and cool, emphasizing the transparency and precise shapes of the glassware, conveying a professional, technological, and safe scientific environment."
        style="
          background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuBCZS8GiEEymdGgzbsGfOU6fqqwqeYbSER4whIRowO0HcrwsuOF8WkNqrgXGL8N0uVxMNehE9Hndf2dbrHwpal5kI5lh0S8UOcn2dVTz6PiObCZ5zobS2rHlRaK2aCVGPBVBwnbUxDQ348HTQGN17KObo4Zo1wv7XvV-cuHvicyQJTK73DYURYzhuxlxC7yOOzeAkXHHShgxi7c195-JYs4hhWTlSjZXC2UIkOxGZ1YwVDmm6xlBXJKALpSVK5LJhT1UHdFnRH-STtD&quot;);
        "
      ></div>
      <!-- Subtle gradient overlay on background for better contrast if needed, mimicking the image mood -->
      <div
        class="absolute inset-0 bg-gradient-to-t from-surface via-transparent to-transparent opacity-80 z-0"
      ></div>
    </main>
    <!-- Backdrop Overlay for Drawer (Glassmorphism Touch) -->
    <!-- Dimming the background to focus on the drawer -->
    <div
      aria-hidden="true"
      class="fixed left-0 top-16 w-full h-[calc(100vh-64px)] z-30 bg-primary/40 backdrop-blur-sm animate-fade-in"
    ></div>
    <!-- SideNavBar (Drawer Component) -->
    <aside
      class="bg-surface-container-low dark:bg-surface-container-lowest shadow-md fixed left-0 top-16 h-[calc(100vh-64px)] z-40 p-4 w-64 flex flex-col animate-slide-in"
    >
      <!-- Header -->
      <div class="mb-lg px-2 pt-2">
        <!-- Simulated Avatar/Logo placeholder -->
        <div
          class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center mb-sm shadow-sm"
        >
          <span
            class="material-symbols-outlined text-on-primary-container"
            data-icon="science"
            >science</span
          >
        </div>
        <h2
          class="font-headline-lg text-headline-lg text-primary leading-tight"
        >
          Menu Principal
        </h2>
        <p class="font-body-sm text-body-sm text-on-surface-variant mt-1">
          Navegação Acadêmica
        </p>
      </div>
      <!-- Navigation Links -->
      <nav class="flex-1 flex flex-col gap-xs font-body-lg text-body-lg">
        <!-- Active Item: Teoria (Assuming this is the active section for demonstration) -->

          class="bg-secondary-container text-on-secondary-container rounded-lg font-bold flex items-center gap-md px-4 py-3 hover:bg-surface-container-highest transition-all duration-200 ease-in-out"

        <!-- Inactive Item: Procedimento -->

          class="text-on-surface-variant hover:bg-surface-variant rounded-lg flex items-center gap-md px-4 py-3 transition-all duration-200 ease-in-out"
          href="procedimentoExperimento.html"
        >
          <span
            class="material-symbols-outlined"
            data-icon="format_list_numbered"
            >format_list_numbered</span

          Procedimento
        </a>
        <!-- Inactive Item: Simulador -->

          class="text-on-surface-variant hover:bg-surface-variant rounded-lg flex items-center gap-md px-4 py-3 transition-all duration-200 ease-in-out"
          href="simuladorInterativo.html"
        >
          <span class="material-symbols-outlined" data-icon="science"
            >science</span
          >
          Simulador
        </a>
        <!-- Inactive Item: Resultado -->

          class="text-on-surface-variant hover:bg-surface-variant rounded-lg flex items-center gap-md px-4 py-3 transition-all duration-200 ease-in-out"
          href="resultadoExperimento.html"
        >
          <span class="material-symbols-outlined" data-icon="analytics"
            >analytics</span
